# bootstrap-icons — provisioning from published Nexus snapshot
# Used for nightly tests against the latest published snapshot version.

- addMavenRepository:
    id: jahia-public
    url: 'https://devtools.jahia.com/nexus/content/groups/public'

- installOrUpgradeBundle: 'mvn:org.jahiacommunity.modules/bootstrap-icons/LATEST'
  autoStart: true
  uninstallPreviousVersion: true
